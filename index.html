<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <div class="conteiner">

        <h3>Cadastro</h3>
        <form action="" id="formulario">

            <img id="image" src="assets/image/transferir (3).png" alt="Imagem de animais">    

            <div class="div">
                <label for="Nome">Nome:</label>
                <input type="text" id="nome" placeholder="Nome" >
                <div id="erroNome" class="erro"></div>
            </div>
            

            <div class="div">
            <label for="Email">Email:</label>
                <input type="email" id="email" placeholder="Email">
                <div id="erroEmail" class="erro"></div>
            </div>

            <div class="div">
                <label for="Telefone">Telefone:</label>
                <input type="number" id="telefone" placeholder="Telefone">
                <div id="erroTelefone" class="erro"></div>

            </div>
            

            <div class="div">
                <label for="CPF">CPF:</label>
                <input type="number" id="cpf" placeholder="CPF">
                <div id="erroCPF" class="erro"></div>
            </div>
            

             <div class="div">
                <label for="Idade">Idade:</label>
                <input type="number" id="idade" placeholder="Idade">
                <div id="erroIdade" class="erro"></div>
             </div>
            

             <div class="div">
                <label for="Cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Cidade">
                <div id="erroCidade" class="erro"></div>
             </div>
            
                
             <div class="div">
                <label for="Moradia">Moradia:</label>
                <input type="radio" name="moradia" value="apartamento"> Apartamento
                <input type="radio" name="moradia" value="casa"> Casa
                <div id="erroMoradia" class="erro"></div>
             </div>
            

             <div class="div">
                <label for="Quintal">Sua moradia tem quintal:</label>
                <input type="radio" name="quintal" value="sim"> Sim
                <input type="radio" name="quintal" value="nao"> Não
                <div id="erroQuintal" class="erro"></div>
             </div>
            
            <div class="div">
             <label for="Pet">Você já teve algum pet antes:</label>
                <input type="radio" name="pet" value="sim"> Sim
                <input type="radio" name="pet" value="nao"> Não
                <div id="erroPet" class="erro"></div>
            </div>

            <div class="div">
                <label for="Horas">Quantas horas você consegue ficar com o seu:</label>
                <input type="number" id="horas" placeholder="Horas">
                <div id="erroHoras" class="erro"></div>
            </div>

            <div class="div">
                
            <label for="Motivo">O motivo da adoção:</label> <br>
            <textarea name="Motivo" id="motivo"></textarea>
                <div id="erroMotivo" class="erro"></div>
            </div>

            
                <label for="Termos">Aceito o termo de responsabilidade</label>
                <input type="checkbox" id="termos"> 
                <div id="erroTermos" class="erro"></div>
            
           


            <button type="submit">Enviar</button>

        </form>

        <div class="resultado" id="resultado"></div>

    
    </div>

    
    <script src="script.js"></script>

</body>
</html>
